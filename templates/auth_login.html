<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - St. Jonathan High School</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container auth-container">
        <header class="header">
            <h1>School Portal Login</h1>
            <p>Access parent, student, staff, or admin services.</p>
        </header>
        <main class="auth-card">
            {% if error %}
                <div class="error-message">{{ error }}</div>
            {% endif %}
            <form method="POST" action="{{ url_for('auth_login') }}">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>

                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>

                <button type="submit" class="send-btn">Login</button>
            </form>
            <p>Don't have an account? <a href="{{ url_for('auth_register') }}">Register here</a></p>
            <p><a href="/">Back to Chatbot</a></p>
        </main>
    </div>
</body>
</html>
